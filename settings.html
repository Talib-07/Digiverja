<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - Digivera</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* BODY */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#e0f2fe,#f1f5f9);
}

/* CARD */
.settings-card{
  width:400px;
  padding:35px;
  border-radius:20px;
  background:white;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  text-align:center;
}

/* TITLE */
.settings-card h2{
  margin-bottom:20px;
  font-weight:700;
  color:#0f172a;
}

/* LIST */
.settings-list{
  text-align:left;
  margin-top:15px;
}

.settings-item{
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  background:#f8fafc;
  cursor:pointer;
  transition:0.3s;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.settings-item:hover{
  background:#e0f2fe;
  transform:translateX(5px);
}

/* ICON */
.icon{
  font-size:18px;
}

/* BUTTON */
.back-btn{
  margin-top:20px;
  padding:10px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#0ea5e9,#2563eb);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.back-btn:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(37,99,235,0.4);
}

</style>
</head>

<body>

<div class="settings-card">

  <h2>Account Settings ⚙️</h2>

  <div class="settings-list">

    <div class="settings-item">
      <span>Manage Brand Identity</span>
      <span class="icon">→</span>
    </div>

    <div class="settings-item">
      <span>Update Marketing Strategy</span>
      <span class="icon">→</span>
    </div>

    <div class="settings-item">
      <span>Growth Planning Tools</span>
      <span class="icon">→</span>
    </div>

  </div>

  <button class="back-btn" onclick="goBack()">Back</button>

</div>

<script>
function goBack(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
