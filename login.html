<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Digivera</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Outfit',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#e0f2fe,#bae6fd,#7dd3fc);
  overflow:hidden;
}

.blur{
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.4;
  animation:float 8s infinite ease-in-out;
}

.blur.one{ background:#38bdf8; top:10%; left:10%; }
.blur.two{ background:#6366f1; bottom:10%; right:10%; }

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-30px);}
}

.login-box{
  width:360px;
  padding:40px;
  border-radius:20px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(15px);
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
  text-align:center;
}

.login-box h2{
  margin-bottom:20px;
  font-size:28px;
  font-weight:700;
  color:#0f172a;
}

.input-box input{
  width:100%;
  padding:12px;
  margin:12px 0;
  border-radius:10px;
  border:1px solid #e2e8f0;
  background:#f8fafc;
  outline:none;
}

.login-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#0ea5e9,#2563eb);
  color:white;
  cursor:pointer;
}

.error{
  color:red;
  margin-bottom:10px;
}

.extra{
  margin-top:15px;
  font-size:14px;
}

.extra a{
  color:#0ea5e9;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="blur one"></div>
<div class="blur two"></div>

<div class="login-box">
  <h2>Welcome Back 👋</h2>

  <div class="error" id="error"></div>

  <form onsubmit="return loginUser()">
    <div class="input-box">
      <input type="email" id="email" placeholder="Enter Email" required>
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Enter Password" required>
    </div>

    <button class="login-btn">Login</button>
  </form>

  <div class="extra">
    Don't have an account? <a href="register.html">Register</a>
  </div>
</div>

<script>
function loginUser(){

  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  // DEMO USER (replace with your own)
  let demoEmail = "admin@gmail.com";
  let demoPass = "1234";

  if(email === demoEmail && pass === demoPass){

    // SAVE USER
    localStorage.setItem("user", email);

    // REDIRECT
    window.location.href = "./dashboard.html";

  }else{
    document.getElementById("error").innerText = "Invalid Email or Password!";
  }

  return false;
}
</script>

</body>
</html>
