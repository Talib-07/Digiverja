<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Digivera</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Outfit',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#e0f2fe,#bae6fd,#7dd3fc);
}

.register-box{
  width:370px;
  padding:40px;
  border-radius:20px;
  background:white;
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
  text-align:center;
}

.register-box h2{
  margin-bottom:20px;
}

.input-box input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #e2e8f0;
}

.register-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#0ea5e9,#2563eb);
  color:white;
  cursor:pointer;
}

.error{
  color:red;
  margin-bottom:10px;
}

.success{
  color:green;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="register-box">
  <h2>Create Account 🚀</h2>

  <div class="error" id="error"></div>
  <div class="success" id="success"></div>

  <form onsubmit="return registerUser()">

    <div class="input-box">
      <input type="text" id="name" placeholder="Full Name" required>
    </div>

    <div class="input-box">
      <input type="email" id="email" placeholder="Email Address" required>
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Password" required>
    </div>

    <button class="register-btn">Register</button>

  </form>

  <p style="margin-top:10px;">
    Already have an account? <a href="login.html">Login</a>
  </p>
</div>

<script>
function registerUser(){

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  // CHECK DUPLICATE EMAIL
  let exists = users.find(user => user.email === email);

  if(exists){
    document.getElementById("error").innerText = "Email already registered!";
    return false;
  }

  // SAVE USER
  users.push({name,email,password:pass});
  localStorage.setItem("users", JSON.stringify(users));

  document.getElementById("success").innerText = "Registered Successfully!";

  // REDIRECT AFTER 1 SEC
  setTimeout(()=>{
    window.location.href = "login.html";
  },1000);

  return false;
}
</script>

</body>
</html>
